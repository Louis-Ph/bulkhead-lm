name: Bug report
description: Report a reproducible defect in the gateway, provider routing, or configuration behavior.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please sanitize keys, secrets, and provider credentials before submitting.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One clear sentence describing the problem.
      placeholder: The gateway returns 502 instead of falling back on 429
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: List the exact commands, requests, or config changes needed to reproduce the issue.
      placeholder: |
        1. Start the gateway with ...
        2. Send this request ...
        3. Observe this response ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Sanitized config or payload
      description: Include only the minimal sanitized material needed to reproduce the issue.
  - type: input
    id: version
    attributes:
      label: Commit or release
      placeholder: 3f0f1f9 or v0.1.0
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - HTTP API
        - Routing and fallback
        - Provider adapter
        - Persistence
        - Security policy
        - SSE and streaming
        - Documentation
    validations:
      required: true
